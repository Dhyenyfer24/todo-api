services:

  postgres:
    image: postgres:16
    container_name: todo-postgres

    environment:
      POSTGRES_DB: todoapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - todo_postgres_data:/var/lib/postgresql/data

  todo-api:
    build: .
    container_name: todo-api

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todoapi
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

volumes:
  todo_postgres_data: